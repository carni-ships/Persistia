<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Persistia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; overflow: hidden; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; }
    canvas { display: block; cursor: crosshair; }

    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 12px 16px;
      font-size: 13px;
      color: #c9d1d9;
      background: linear-gradient(to bottom, rgba(13,17,23,0.92) 70%, transparent);
      pointer-events: none;
      z-index: 10;
    }
    #hud > * { pointer-events: auto; }
    .hud-row { display: flex; gap: 20px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
    .hud-label { color: #8b949e; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    .hud-value { color: #58a6ff; }
    .hud-green { color: #3fb950; }
    .hud-yellow { color: #d29922; }
    .hud-red { color: #f85149; }

    button {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
    }
    button:hover { background: #30363d; }

    #block-selector { display: flex; gap: 4px; align-items: center; }
    .block-btn {
      width: 24px; height: 24px;
      border-radius: 3px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.1s;
    }
    .block-btn.active { border-color: #58a6ff; }
    .block-btn:hover { border-color: #8b949e; }

    #controls-hint {
      font-size: 11px;
      color: #484f58;
    }

    #root-display {
      font-size: 10px;
      color: #30363d;
      margin-top: 2px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div id="hud">
    <div class="hud-row">
      <span><span class="hud-label">Status: </span><span id="status" class="hud-yellow">Connecting...</span></span>
      <span><span class="hud-label">ID: </span><span id="pubkey" class="hud-value">-</span></span>
      <span><span class="hud-label">Seq: </span><span id="seq" class="hud-value">0</span></span>
      <button onclick="setUrl()">Node URL</button>
    </div>
    <div class="hud-row">
      <span class="hud-label">Inventory:</span>
      <span id="inv" class="hud-green">-</span>
    </div>
    <div class="hud-row">
      <span class="hud-label">Block:</span>
      <div id="block-selector">
        <div class="block-btn active" data-block="1" style="background:#8B6914" title="Dirt [1]" onclick="selectBlock(1)"></div>
        <div class="block-btn" data-block="2" style="background:#808080" title="Stone [2]" onclick="selectBlock(2)"></div>
        <div class="block-btn" data-block="3" style="background:#654321" title="Wood [3]" onclick="selectBlock(3)"></div>
        <div class="block-btn" data-block="4" style="background:#228B22" title="Grass [4]" onclick="selectBlock(4)"></div>
      </div>
      <span id="selected-block" class="hud-value">dirt</span>
      <button onclick="doCraft('house')">Craft House (5d+5w)</button>
      <button onclick="doCraft('wall')">Craft Wall (3s)</button>
      <button onclick="doCraft('bridge')">Craft Bridge (8w)</button>
    </div>
    <div id="controls-hint">
      WASD move &middot; Click place &middot; Right-click break &middot; 1-4 select block
    </div>
    <div id="root-display"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
