[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc = "0.8.28"
extra_output = ["abi"]
via_ir = true
optimizer = true
optimizer_runs = 200

remappings = [
    "contracts/=../contracts/",
]
allow_paths = ["../contracts"]
fs_permissions = [{ access = "read", path = "testdata" }]
