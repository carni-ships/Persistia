name = "persistia"
main = "src/index.ts"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]

[[rules]]
type = "Text"
globs = ["**/*.html"]

[[durable_objects.bindings]]
name = "PERSISTIA_WORLD"
class_name = "PersistiaWorldV4"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PersistiaWorldV4"]

# ─── Environment Variables ─────────────────────────────────────────────
# NODE_URL       — This node's public URL
# SEED_NODES     — Comma-separated seed node URLs for gossip bootstrap
# BERACHAIN_RPC        — Berachain RPC URL (default: https://rpc.berachain.com)
# BERACHAIN_PRIVATE_KEY — Hex-encoded private key for signing anchor txs
# HYBERDB_ADDRESS       — HyberDB contract address
