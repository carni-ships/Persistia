name = "persistia"
main = "src/index.ts"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]

[[rules]]
type = "Text"
globs = ["**/*.html"]

[[durable_objects.bindings]]
name = "PERSISTIA_WORLD"
class_name = "PersistiaWorld"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PersistiaWorld"]
